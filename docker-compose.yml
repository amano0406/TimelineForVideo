name: timelineforvideo

services:
  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      TIMELINEFORVIDEO_RUNTIME_DEFAULTS: /app/config/runtime.defaults.json
      TIMELINEFORVIDEO_APPDATA_ROOT: /data/app-data
      TIMELINEFORVIDEO_UPLOADS_ROOT: /data/input
      TIMELINEFORVIDEO_OUTPUTS_ROOT: /data/output
      HF_HOME: /data/cache/huggingface
      TRANSFORMERS_CACHE: /data/cache/huggingface
      TORCH_HOME: /data/cache/torch
    volumes:
      - ./data/app-data:/data/app-data
      - ./data/input:/data/input:ro
      - ./data/output:/data/output
      - ./data/cache/huggingface:/data/cache/huggingface
      - ./data/cache/torch:/data/cache/torch
